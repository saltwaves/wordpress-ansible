---
- name: Deny incoming traffic by default
  ufw:
    direction: incoming
    policy: deny

- name: Allow HTTP
  ufw:
    rule: allow
    port: "80"
    proto: tcp

- name: Allow HTTPS
  ufw:
    rule: allow
    port: "443"
    proto: tcp

- name: Allow SSH
  ufw:
    rule: allow
    port: "{{ ssh_port | string }}"
    proto: tcp

- name: Enable firewall
  ufw:
    state: enabled
