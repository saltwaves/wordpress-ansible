---
- name: Ensure sudo group is present
  group:
    name: sudo
    state: present

- name: Ensure sudo group has sudo privileges
  lineinfile:
    dest: /etc/sudoers
    state: present
    regexp: "^%sudo"
    line: "%sudo ALL=(ALL:ALL) ALL"
    validate: "/usr/sbin/visudo -cf %s"

- name: Create default user
  user:
    name: "{{ deploy_user }}"
    groups: sudo
    append: true
    password: "{{ deploy_user_password_hash if deploy_user_password_hash | length > 0 else omit }}"
    shell: /bin/bash
    update_password: on_create
    state: present

- name: Add authorized key
  authorized_key:
    user: "{{ deploy_user }}"
    key: "{{ lookup('file', deploy_user_public_key_path) }}"
  when: deploy_user_public_key_path | length > 0
