---
- name: Create SSH drop-in directory
  file:
    path: /etc/ssh/sshd_config.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Install SSH hardening drop-in
  copy:
    dest: /etc/ssh/sshd_config.d/99-wordpress-hardening.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      PermitRootLogin no
      PasswordAuthentication no
      KbdInteractiveAuthentication no
      PubkeyAuthentication yes
  notify: restart ssh
