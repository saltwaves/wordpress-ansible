---
- name: Install Sury PHP repository prerequisites
  apt:
    name:
      - ca-certificates
      - curl
      - lsb-release
    state: present
    update_cache: true
  when: php_install_sury_repository | bool

- name: Download Sury PHP archive keyring package
  get_url:
    url: "{{ php_sury_keyring_deb_url }}"
    dest: "{{ php_sury_keyring_deb_path }}"
    mode: "0644"
  when: php_install_sury_repository | bool

- name: Install Sury PHP archive keyring
  apt:
    deb: "{{ php_sury_keyring_deb_path }}"
    state: present
  when: php_install_sury_repository | bool

- name: Add Sury PHP repository
  apt_repository:
    repo: "{{ php_sury_repository }}"
    filename: sury-php
    state: present
    update_cache: true
  when: php_install_sury_repository | bool

- name: Install PHP
  apt:
    name: "{{ php_packages }}"
    state: present
    update_cache: true

- name: Enable PHP-FPM
  service:
    name: "{{ php_service_name }}"
    enabled: true
    state: started

- name: Set PHP user
  lineinfile:
    dest: "{{ php_fpm_pool_conf }}"
    regexp: "^user"
    line: "user = {{ deploy_user }}"
    state: present
  notify: restart php-fpm

- name: Set PHP group
  lineinfile:
    dest: "{{ php_fpm_pool_conf }}"
    regexp: "^group"
    line: "group = {{ deploy_user }}"
    state: present
  notify: restart php-fpm

- name: Set PHP listen owner
  lineinfile:
    dest: "{{ php_fpm_pool_conf }}"
    regexp: "^listen\\.owner"
    line: "listen.owner = {{ deploy_user }}"
    state: present
  notify: restart php-fpm

- name: Set PHP listen group
  lineinfile:
    dest: "{{ php_fpm_pool_conf }}"
    regexp: "^listen\\.group"
    line: "listen.group = {{ deploy_user }}"
    state: present
  notify: restart php-fpm

- name: Tune PHP-FPM ini values
  lineinfile:
    dest: "{{ php_fpm_ini }}"
    regexp: "^;?{{ item.key }}\\s*="
    line: "{{ item.key }} = {{ item.value }}"
    state: present
  loop:
    - key: upload_max_filesize
      value: "{{ php_upload_max_filesize }}"
    - key: post_max_size
      value: "{{ php_post_max_size }}"
    - key: memory_limit
      value: "{{ php_memory_limit }}"
    - key: max_execution_time
      value: "{{ php_max_execution_time }}"
  notify: reload php-fpm
