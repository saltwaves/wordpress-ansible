---
- name: Install PHP
  apt:
    name: "{{ php_packages }}"
    state: present
    update_cache: true

- name: Enable PHP-FPM
  service:
    name: "{{ php_service_name }}"
    enabled: true
    state: started

- name: Set PHP user
  lineinfile:
    dest: "{{ php_fpm_pool_conf }}"
    regexp: "^user"
    line: "user = {{ deploy_user }}"
    state: present
  notify: restart php-fpm

- name: Set PHP group
  lineinfile:
    dest: "{{ php_fpm_pool_conf }}"
    regexp: "^group"
    line: "group = {{ deploy_user }}"
    state: present
  notify: restart php-fpm

- name: Set PHP listen owner
  lineinfile:
    dest: "{{ php_fpm_pool_conf }}"
    regexp: "^listen\\.owner"
    line: "listen.owner = {{ deploy_user }}"
    state: present
  notify: restart php-fpm

- name: Set PHP listen group
  lineinfile:
    dest: "{{ php_fpm_pool_conf }}"
    regexp: "^listen\\.group"
    line: "listen.group = {{ deploy_user }}"
    state: present
  notify: restart php-fpm

- name: Tune PHP-FPM ini values
  lineinfile:
    dest: "{{ php_fpm_ini }}"
    regexp: "^;?{{ item.key }}\\s*="
    line: "{{ item.key }} = {{ item.value }}"
    state: present
  loop:
    - key: upload_max_filesize
      value: "{{ php_upload_max_filesize }}"
    - key: post_max_size
      value: "{{ php_post_max_size }}"
    - key: memory_limit
      value: "{{ php_memory_limit }}"
    - key: max_execution_time
      value: "{{ php_max_execution_time }}"
  notify: reload php-fpm
